[package]
name = "postgresql-trino-gateway"
version = "0.1.0"
edition = "2024"

[dependencies]
pgwire = { path = "../pgwire" }
tokio = { version = "1", features = ["full"] }
async-trait = "0.1"
futures = "0.3"
clap = { version = "4", features = ["derive"] }
tracing = "0.1"
tracing-subscriber = "0.3"
anyhow = "1"
serde_json = "1"
trino-rust-client = { path = "../trino-rust-client" }
serde = { version = "1", features = ["derive"] }
async-stream = "0.3"
